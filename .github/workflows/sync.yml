name: Sync World Cup Data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger World Cup sync
        run: |
          curl -i -X POST \
            -H "x-sync-secret: ${{ secrets.SYNC_SECRET }}" \
            https://world-cup-tracker-hazel.vercel.app/api/sync/world-cup

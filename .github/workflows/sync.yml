name: Sync World Cup Data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      SYNC_SECRET: ${{ secrets.SYNC_SECRET }}

    steps:
      - name: Check secret exists
        run: |
          if [ -z "$SYNC_SECRET" ]; then
            echo "SYNC_SECRET is empty"
            exit 1
          else
            echo "SYNC_SECRET exists"
          fi

      - name: Trigger World Cup sync
        run: |
          curl --fail-with-body -i -X POST \
            -H "x-sync-secret: $SYNC_SECRET" \
            https://world-cup-tracker-hazel.vercel.app/api/sync/world-cup